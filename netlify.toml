[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_IDENTITY_URL = "https://identity-aadhar-gateway.onrender.com"
  VITE_IDENTITY_WEB_URL = "https://aadharcha.in"
  VITE_TRUST_API_URL = "https://identity-aadhar-gateway.onrender.com"

# SPA routing - redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy (optional - for future backend integration)
[[redirects]]
  from = "/api/*"
  to = "https://buyer-app-preprod-v2.ondc.org/api/:splat"
  status = 200
  force = true
